<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h1>Maestro Task</h1>
            <p>Gerencie suas tarefas de forma simples.</p>
            
            <div class="area-input">
                <input type="text" id="inputTarefa" placeholder="Digite uma nova tarefa..." maxlength="100">
                <button id="botaoAdicionar">Adicionar</button>
            </div>
        </header>

        <main class="quadro-tarefas">
            <div id="listaTarefas"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
